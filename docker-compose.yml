services:
  postgres:
    image: postgres:16-alpine
    container_name: pulsefx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulsefx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulsefx}
      POSTGRES_DB: ${POSTGRES_DB:-pulsefx}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pulsefx_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pulsefx} -d ${POSTGRES_DB:-pulsefx}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: pulsefx-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pulsefx}:${POSTGRES_PASSWORD:-pulsefx}@postgres:5432/${POSTGRES_DB:-pulsefx}
      PORT: 3333
      FRED_API_KEY: ${FRED_API_KEY:-}
      ADMIN_SYNC_TOKEN: ${ADMIN_SYNC_TOKEN:-troque-por-um-valor-secreto}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "${API_PORT:-3333}:3333"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3333/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3333}
    container_name: pulsefx-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pulsefx_postgres_data:
